            margin: 0;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.6);
        }
        header h1 {
            font-size: 24px;
            margin: 0;
        }
        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            position: relative;
        }
        .nav-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 50px 20px;
        }
        .tagline {
            font-size: 20px;
            margin-top: 10px;
            font-weight: 300;
        }
        /* Home cards */
        .home-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .home-card {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .home-card:hover {
            transform: scale(1.05);
        }
        .home-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .tagline{
            font-family: 'Times New Roman', Times, serif;
        }
        /* Offer slider (small cards like Amazon) */
        .slider {
            margin-top: 40px;
            overflow: hidden;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
        }
        .slides {
            display: flex;
            gap: 15px;
            animation: slide 20s infinite linear;
        }
        .slides img {
            width: 200px; /* small card width */
            height: 150px; /* small card height */
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        @keyframes slide {
            0% { transform: translateX(0%); }
            20% { transform: translateX(0%); }
            25% { transform: translateX(-220px); }
            40% { transform: translateX(-220px); }
            45% { transform: translateX(-440px); }
            60% { transform: translateX(-440px); }
            65% { transform: translateX(-660px); }
            80% { transform: translateX(-660px); }
            85% { transform: translateX(-880px); }
            100% { transform: translateX(-880px); }
        }
        /* Products grid */

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

            background: rgba(255,255,255,0.1);

        }

            border: none;

            padding: 5px 10px;

            cursor: pointer;
        }

            background: #8e44ad;

        function updateNavCounts() {

        // Toast notification function

            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            
            if (action && actionHandler) {
                const undoBtn = document.createElement('button');
                undoBtn.className = 'toast-undo';
                undoBtn.textContent = action;
                undoBtn.onclick = actionHandler;
                toast.appendChild(undoBtn);
            }
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

                        <img src="https://sylvi.in/cdn/shop/articles/Top_Offers_Discounts_on_Wrist_Watches_copy_1600x.jpg?v=1721280792" alt="Offer 5">
                        <img src="https://www.shutterstock.com/image-vector/shopping-time-clock-last-minute-260nw-2055352352.jpg" alt="Offer 6">
                        <img src="https://www.shutterstock.com/image-vector/last-minute-offer-watch-countdown-260nw-2647786293.jpg" alt="Offer 7">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRo6ECekihjzxScNkNNXDh1aJ1rjYizshcsxg&s" alt="Offer 8">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwCUNm5G97swbZH5JeKTec7grc4jyEGT4VBg&s" alt="Offer 9">
                        <img src="https://www.shutterstock.com/image-vector/last-minute-offer-watch-countdown-260nw-2647786293.jpg" alt="Offer 10">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHh3-fM74b8r7x6NOZYXG6dkTmEGyNWww_9g&s" alt="Offer 11">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsmsBfrOdgaXTfgvXBTWSh_3zTnzX-9mP51A&s" alt="Offer 11">
                    </div>
                </div>
            `;
        }

        function choosePerson(mode, person) {
            if (person) {
                setBackground(person.toLowerCase());
                let categories = ["Formal Office Wear", "Traditional Dresses", "Footwear", "Accessories"];
                if (person === "Kids") {
                    categories = ["Traditional Dresses", "Footwear", "Accessories", "Night Dresses"];
                }
                document.getElementById("main-content").innerHTML = `
                    <h2>Choose Category for ${person} (${mode})</h2>
                    ${categories.map(cat => `
                        <button class="btn btn-primary" onclick="showProducts('${mode}','${person}','${cat}')">${cat}</button>
                    `).join("")}
                    <br><br>
                    <button class="btn btn-secondary" onclick="choosePerson('${mode}')">Back</button>
                `;
            } else {
                document.getElementById("main-content").innerHTML = `
                    <h2>Choose Person (${mode})</h2>
                    <button class="btn btn-primary" onclick="choosePerson('${mode}','Men')">Men</button>
                    <button class="btn btn-primary" onclick="choosePerson('${mode}','Women')">Women</button>
                    <button class="btn btn-primary" onclick="choosePerson('${mode}','Kids')">Kids</button>
                `;
            }
        }

        function showProducts(mode, person, category) {
            // Set background based on person and category
            const bgKey = `${person.toLowerCase()}_${category.toLowerCase().replace(' ', '_')}`;
            setBackground(bgKey);
            
            const categoryProducts = products[person][category];
            
            if (!categoryProducts) {
                document.getElementById("main-content").innerHTML = `
                    <h2>No products available for ${category} (${person})</h2>
                    <button class="btn btn-secondary" onclick="choosePerson('${mode}', '${person}')">Back</button>
                `;
                return;
            }
            
            document.getElementById("main-content").innerHTML = `
                <h2>${category} for ${person} (${mode})</h2>
                <div class="products">
                    ${categoryProducts.map(product => {
                        // Determine which button to show based on mode
                        let actionButton = '';
                        if (mode === 'buy') {
                            actionButton = `<button class="btn btn-buy" onclick="addToCart(${product.id}, 'buy')">Add to Cart (Buy)</button>`;
                        } else if (mode === 'rent') {
                            actionButton = `<button class="btn btn-rent" onclick="addToCart(${product.id}, 'rent')">Add to Cart (Rent)</button>`;
                        }
                        
                        return `
                            <div class="product-card">
                                <img src="${product.image}" alt="${product.name}">
                                <h3>${product.name}</h3>
                                <div class="price">
                                    ${mode === 'buy' ? `Buy: $${product.price}` : `Rent: $${product.rentPrice}`}
                                </div>
                                <div class="action-buttons">
                                    ${actionButton}
                                    <button class="btn btn-like" onclick="addToLikes(${product.id})">❤️ Like</button>
                                </div>
                            </div>
                        `;
                    }).join("")}
                </div>
                <br>
                <button class="btn btn-secondary" onclick="choosePerson('${mode}', '${person}')">Back to Categories</button>
            `;
        }

        function addToCart(productId, mode) {
            // Find the product in our database
            let product = null;
            for (const person in products) {
                for (const category in products[person]) {
                    const found = products[person][category].find(p => p.id === productId);
                    if (found) {
                        product = found;
                        break;
                    }
                }
                if (product) break;
            }
            
            if (product) {
                // Check if product already in cart
                const existingItem = cart.find(item => item.id === productId && item.mode === mode);
                
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push({
                        ...product,
                        mode: mode,
                        quantity: 1
                    });
                }
                
                // Store last action for undo
                lastAction = {
                    type: 'cart',
                    productId: productId,
                    mode: mode,
                    product: product
                };
                
                updateCartDisplay();
                updateNavCounts();
                showToast(`${product.name} added to cart!`, "Undo", undoLastAction);
            }
        }

        function addToLikes(productId) {
            // Find the product in our database
            let product = null;
            for (const person in products) {
                for (const category in products[person]) {
                    const found = products[person][category].find(p => p.id === productId);
                    if (found) {
                        product = found;
                        break;
                    }
                }
                if (product) break;
            }
            
            if (product) {
                // Check if product already in likes
                const existingItem = likes.find(item => item.id === productId);
                
                if (!existingItem) {
                    likes.push(product);
                    
                    // Store last action for undo
                    lastAction = {
                        type: 'like',
                        productId: productId,
                        product: product
                    };
                    
                    updateLikesDisplay();
                    updateNavCounts();
                    showToast(`${product.name} added to likes!`, "Undo", undoLastAction);
                } else {
                    showToast(`${product.name} is already in your likes!`);
                }
            }
        }

        function undoLastAction() {
            if (!lastAction) return;
            
            if (lastAction.type === 'cart') {
                // Remove from cart
                const index = cart.findIndex(item => 
                    item.id === lastAction.productId && item.mode === lastAction.mode
                );
                
                if (index !== -1) {
                    const item = cart[index];
                    if (item.quantity > 1) {
                        item.quantity -= 1;
                    } else {
                        cart.splice(index, 1);
                    }
                    
                    updateCartDisplay();
                    updateNavCounts();
                    showToast(`${lastAction.product.name} removed from cart!`);
                }
            } else if (lastAction.type === 'like') {
                // Remove from likes
                const index = likes.findIndex(item => item.id === lastAction.productId);
                
                if (index !== -1) {
                    likes.splice(index, 1);
                    updateLikesDisplay();
                    updateNavCounts();
                    showToast(`${lastAction.product.name} removed from likes!`);
                }
            }
            
            lastAction = null;
        }

        function removeFromCart(productId, mode) {
            const index = cart.findIndex(item => item.id === productId && item.mode === mode);
            
            if (index !== -1) {
                const product = cart[index];
                cart.splice(index, 1);
                updateCartDisplay();
                updateNavCounts();
                
                // Store last action for undo
                lastAction = {
                    type: 'cart-remove',
                    productId: productId,
                    mode: mode,
                    product: product
                };
                
                showToast(`${product.name} removed from cart!`, "Undo", undoRemoveFromCart);
            }
        }

        function removeFromLikes(productId) {
            const index = likes.findIndex(item => item.id === productId);
            
            if (index !== -1) {
                const product = likes[index];
                likes.splice(index, 1);
                updateLikesDisplay();
                updateNavCounts();
                
                // Store last action for undo
                lastAction = {
                    type: 'like-remove',
                    productId: productId,
                    product: product
                };
                
                showToast(`${product.name} removed from likes!`, "Undo", undoRemoveFromLikes);
            }
        }

        function undoRemoveFromCart() {
            if (lastAction && lastAction.type === 'cart-remove') {
                cart.push({
                    ...lastAction.product,
                    mode: lastAction.mode,
                    quantity: 1
                });
                
                updateCartDisplay();
                updateNavCounts();
                showToast(`${lastAction.product.name} added back to cart!`);
                lastAction = null;
            }
        }

        function undoRemoveFromLikes() {
            if (lastAction && lastAction.type === 'like-remove') {
                likes.push(lastAction.product);
                updateLikesDisplay();
                updateNavCounts();
                showToast(`${lastAction.product.name} added back to likes!`);
                lastAction = null;
            }
        }

        function updateCartDisplay() {
            const cartDiv = document.getElementById("cart");
            let total = 0;
            
            if (cart.length === 0) {
                cartDiv.innerHTML = `
                    <h2>Your Cart</h2>
                    <div class="empty-message">Your cart is empty</div>
                `;
                return;
            }
            
            cartDiv.innerHTML = `
                <h2>Your Cart</h2>
                ${cart.map(item => {
                    const price = item.mode === 'buy' ? item.price : item.rentPrice;
                    total += price * item.quantity;
                    return `
                        <div class="cart-item">
                            <img src="${item.image}" alt="${item.name}">
                            <div class="cart-item-details">
                                <div><strong>${item.name}</strong></div>
                                <div>${item.mode === 'buy' ? 'Buy' : 'Rent'}: $${price} x ${item.quantity}</div>
                                <button class="btn btn-undo" onclick="removeFromCart(${item.id}, '${item.mode}')">Remove</button>
                            </div>
                        </div>
                    `;
                }).join("")}
                <div class="cart-total">Total: $${total.toFixed(2)}</div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;">Checkout</button>
            `;
        }

        function updateLikesDisplay() {
            const likesDiv = document.getElementById("likes");
            
            if (likes.length === 0) {
                likesDiv.innerHTML = `
                    <h2>Your Likes</h2>
                    <div class="empty-message">You haven't liked any items yet</div>
                `;
                return;
            }
            
            likesDiv.innerHTML = `
                <h2>Your Likes</h2>
                ${likes.map(item => `
                    <div class="like-item">
                        <img src="${item.image}" alt="${item.name}">
                        <div class="like-item-details">
                            <div><strong>${item.name}</strong></div>
                            <div>Buy: $${item.price} | Rent: $${item.rentPrice}</div>
                            <button class="btn btn-undo" onclick="removeFromLikes(${item.id})">Remove</button>
                        </div>
                    </div>
                `).join("")}
            `;
        }

        function toggleCart() {
            const cartDiv = document.getElementById("cart");
            const isVisible = cartDiv.style.display === "block";
            
            cartDiv.style.display = isVisible ? "none" : "block";
            
            // Hide likes when showing cart
            if (!isVisible) {
                document.getElementById("likes").style.display = "none";
            }
        }

        function toggleLikes() {
            const likesDiv = document.getElementById("likes");
            const isVisible = likesDiv.style.display === "block";
            
            likesDiv.style.display = isVisible ? "none" : "block";
            
            // Hide cart when showing likes
            if (!isVisible) {
                document.getElementById("cart").style.display = "none";
            }
        }

        function showLogin() {
            document.getElementById("main-content").innerHTML = "";
            document.getElementById("loginPage").style.display = "block";
        }

        function hideLogin() {
            document.getElementById("loginPage").style.display = "none";
            showHome();
        }

        // Initialize the page
        showHome();
        updateNavCounts();
    </script>
</body>
</html>
